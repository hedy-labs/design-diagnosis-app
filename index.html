<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Design Diagnosis - Free Vitality Score for your Airbnb listing. AI-powered interior design analysis.">
    <title>Design Diagnosis - Airbnb Interior Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #333;
            background: linear-gradient(135deg, #faf8f3 0%, #f5f0e8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 1.5rem 2rem;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #B8785A;
        }

        .logo-subtitle {
            font-size: 0.65rem;
            color: #7d8a6b;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge {
            background: #f0e6d2;
            color: #B8785A;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem 2rem;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            color: #2c2c2c;
            margin-bottom: 0.5rem;
            line-height: 1.1;
        }

        .hero h2 {
            font-size: clamp(1.25rem, 4vw, 1.75rem);
            font-weight: 500;
            color: #7d8a6b;
            margin-bottom: 1rem;
            font-family: 'Playfair Display', serif;
        }

        .hero p {
            font-size: 1rem;
            color: #555;
            line-height: 1.6;
            max-width: 500px;
            margin: 0 auto 2rem;
        }

        /* Email Signup */
        .signup-section {
            margin-bottom: 3rem;
        }
