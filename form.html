<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Diagnosis — Property Report</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #2C3E50;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .brand-badge {
            display: inline-block;
            background: #E74C3C;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .form-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #2C3E50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }
        
        label .required {
            color: #E74C3C;
            margin-left: 4px;
        }
        
        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .form-row.three {
            grid-template-columns: 1fr 1fr 1fr;
        }
        
        @media (max-width: 600px) {
            .form-row,
            .form-row.three {
                grid-template-columns: 1fr;
            }
        }
        
        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        
        @media (max-width: 600px) {
            .checkbox-group {
                grid-template-columns: 1fr;
            }
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .checkbox-item:hover {
            background: #f9f9f9;
        }
        
        .checkbox-item input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }
        
        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            font-weight: 400;
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        
        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .radio-item input[type="radio"] {
            cursor: pointer;
        }
        
        .radio-item label {
            margin: 0;
            cursor: pointer;
            font-weight: 400;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit {
            background: #667eea;
            color: white;
        }
        
        .btn-submit:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-reset:hover {
            background: #e0e0e0;
        }
        
        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .message.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid #0c5460;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }
        
        .step-indicator::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: #e0e0e0;
            z-index: 0;
        }
        
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
            flex: 1;
        }
        
        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .step.active .step-number {
            background: #667eea;
            color: white;
        }
        
        .step.completed .step-number {
            background: #28a745;
            color: white;
        }
        
        .step-label {
            font-size: 12px;
            color: #999;
            text-align: center;
        }
        
        .step.active .step-label,
        .step.completed .step-label {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>✨ Design Diagnosis</h1>
            <p>Get your property's vitality score in minutes</p>
            <span class="brand-badge">Powered by Rachel's Expertise</span>
        </div>
        
        <!-- Step Indicator -->
        <div class="step-indicator">
            <div class="step active" id="step1-indicator">
                <div class="step-number">1</div>
                <div class="step-label">Property</div>
            </div>
            <div class="step" id="step2-indicator">
                <div class="step-number">2</div>
                <div class="step-label">Comfort</div>
            </div>
            <div class="step" id="step3-indicator">
                <div class="step-number">3</div>
                <div class="step-label">Submit</div>
            </div>
        </div>
        
        <!-- Messages -->
        <div id="message" class="message"></div>
        
        <!-- Form -->
        <form id="designForm" onsubmit="handleSubmit(event)">
            
            <!-- Step 1: Property Details -->
            <div id="step1" class="form-section">
                <div class="section-title">Step 1: Property Details</div>
                
                <div class="form-group">
                    <label>Property Name or Address <span class="required">*</span></label>
                    <input type="text" name="property_name" required>
                </div>
                
                <div class="form-group">
                    <label>Airbnb/VRBO URL <span style="color: #ef4444; font-weight: bold;">*</span></label>
                    <input type="url" name="airbnb_url" placeholder="https://www.airbnb.com/rooms/..." required>
                    <small style="color: #6b7280; margin-top: 5px; display: block;">Required: Provide your listing URL or upload photos below</small>
                </div>
                
                <div class="form-group">
                    <label>Property Type <span class="required">*</span></label>
                    <select name="listing_type" required>
                        <option value="">Select...</option>
                        <option value="House">House</option>
                        <option value="Condo">Condo</option>
                        <option value="Apartment">Apartment</option>
                        <option value="Studio">Studio</option>
                        <option value="Suite">Suite</option>
                        <option value="Private Room">Private Room</option>
                    </select>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Bedrooms <span class="required">*</span></label>
                        <select name="bedrooms" required>
                            <option value="">Select...</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5+</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Bathrooms <span class="required">*</span></label>
                        <select name="bathrooms" required>
                            <option value="">Select...</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4+</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Guest Capacity <span class="required">*</span></label>
                        <select name="guest_capacity" required>
                            <option value="">Select...</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">8+</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Total Photos <span class="required">*</span></label>
                        <select name="total_photos" required>
                            <option value="">Select...</option>
                            <option value="0-5">0-5</option>
                            <option value="6-10">6-10</option>
                            <option value="11-15">11-15</option>
                            <option value="16-20">16-20</option>
                            <option value="21-30">21-30</option>
                            <option value="31-40">31-40</option>
                            <option value="41-50">41-50</option>
                            <option value="51+">51+</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- Step 2: Guest Comfort Checklist -->
            <div id="step2" class="form-section" style="display: none;">
                <div class="section-title">Step 2: Guest Comfort Checklist</div>
                
                <!-- Bedroom -->
                <div class="form-group">
                    <label style="border-bottom: none; margin-bottom: 10px;"><strong>Bedroom</strong></label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="bedside_tables" id="bedside_tables">
                            <label for="bedside_tables">Bedside tables</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="bedside_lamps" id="bedside_lamps">
                            <label for="bedside_lamps">Bedside lamps</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="mattress_protector" id="mattress_protector">
                            <label for="mattress_protector">Mattress protector</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="pillow_protector" id="pillow_protector">
                            <label for="pillow_protector">Pillow protectors</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="two_pillows" id="two_pillows">
                            <label for="two_pillows">2 pillows per guest</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="hangers" id="hangers">
                            <label for="hangers">Hangers in closet</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="full_length_mirror" id="full_length_mirror">
                            <label for="full_length_mirror">Full-length mirror</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="extra_blanket" id="extra_blanket">
                            <label for="extra_blanket">Extra blanket</label>
                        </div>
                    </div>
                </div>
                
                <!-- Bathroom -->
                <div class="form-group">
                    <label style="border-bottom: none; margin-bottom: 10px; margin-top: 20px;"><strong>Bathroom</strong></label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="shower_hooks" id="shower_hooks">
                            <label for="shower_hooks">Shower hooks/caddy</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="plunger" id="plunger">
                            <label for="plunger">Plunger</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="soap" id="soap">
                            <label for="soap">Soap/hand wash</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="towel_hooks" id="towel_hooks">
                            <label for="towel_hooks">Towel hooks</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="two_towels" id="two_towels">
                            <label for="two_towels">2 towels per guest</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="facecloths" id="facecloths">
                            <label for="facecloths">Face cloths</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="drain_catcher" id="drain_catcher">
                            <label for="drain_catcher">Drain catcher</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="toilet_brush" id="toilet_brush">
                            <label for="toilet_brush">Toilet brush</label>
                        </div>
                    </div>
                </div>
                
                <!-- Kitchen -->
                <div class="form-group">
                    <label style="border-bottom: none; margin-bottom: 10px; margin-top: 20px;"><strong>Kitchen</strong></label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="can_opener" id="can_opener">
                            <label for="can_opener">Can opener</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="dish_drying_rack" id="dish_drying_rack">
                            <label for="dish_drying_rack">Dish drying rack</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="kitchen_essentials" id="kitchen_essentials">
                            <label for="kitchen_essentials">Sharp knives/scissors</label>
                        </div>
                    </div>
                </div>
                
                <!-- Living & Entry -->
                <div class="form-group">
                    <label style="border-bottom: none; margin-bottom: 10px; margin-top: 20px;"><strong>Living & Entry</strong></label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="coat_hooks" id="coat_hooks">
                            <label for="coat_hooks">Coat hooks at entry</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="power_bars" id="power_bars">
                            <label for="power_bars">Power bars/outlets</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="welcome_basket" id="welcome_basket">
                            <label for="welcome_basket">Welcome basket</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="comfort" value="wifi" id="wifi">
                            <label for="wifi">WiFi access</label>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Step 3: Email & Report Type -->
            <div id="step3" class="form-section" style="display: none;">
                <div class="section-title">Step 3: Get Your Report</div>
                
                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <input type="email" name="email" required placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label>Report Type <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" name="report_type" value="free" id="report_free" checked>
                            <label for="report_free">
                                <strong>Free</strong><br>
                                <small>Score + Top 3 Fixes</small>
                            </label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="report_type" value="premium" id="report_premium">
                            <label for="report_premium">
                                <strong>Premium ($39)</strong><br>
                                <small>Full Report + Shopping Lists</small>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Buttons -->
            <div class="button-group">
                <button type="button" class="btn-reset" id="prevBtn" onclick="changeStep(-1)" style="display: none;">← Back</button>
                <button type="button" class="btn-submit" id="nextBtn" onclick="changeStep(1)">Next →</button>
                <button type="submit" class="btn-submit" id="submitBtn" style="display: none;">Get Your Report</button>
            </div>
        </form>
    </div>
    
    <script>
        let currentStep = 1;
        const totalSteps = 3;
        
        function showStep(step) {
            // Hide all steps
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'none';
            
            // Show current step
            document.getElementById(`step${step}`).style.display = 'block';
            
            // Update indicators
            for (let i = 1; i <= totalSteps; i++) {
                const indicator = document.getElementById(`step${i}-indicator`);
                if (i < step) {
                    indicator.classList.add('completed');
                    indicator.classList.remove('active');
                } else if (i === step) {
                    indicator.classList.add('active');
                    indicator.classList.remove('completed');
                } else {
                    indicator.classList.remove('completed', 'active');
                }
            }
            
            // Update buttons
            document.getElementById('prevBtn').style.display = step > 1 ? 'block' : 'none';
            document.getElementById('nextBtn').style.display = step < totalSteps ? 'block' : 'none';
            document.getElementById('submitBtn').style.display = step === totalSteps ? 'block' : 'none';
            
            // Scroll to top
            document.querySelector('.container').scrollTop = 0;
        }
        
        function changeStep(direction) {
            // Validate before moving forward
            if (direction > 0) {
                if (currentStep === 1) {
                    // Validate Step 1 - with better debugging
                    const property_name = document.querySelector('input[name="property_name"]');
                    const listing_type = document.querySelector('select[name="listing_type"]');
                    const bedrooms = document.querySelector('select[name="bedrooms"]');
                    const bathrooms = document.querySelector('select[name="bathrooms"]');
                    const guest_capacity = document.querySelector('select[name="guest_capacity"]');
                    const total_photos = document.querySelector('select[name="total_photos"]');
                    const airbnb_url = document.querySelector('input[name="airbnb_url"]');
                    
                    const errors = [];
                    
                    // Check text inputs
                    if (!property_name || !property_name.value.trim()) errors.push('Property Name');
                    if (!airbnb_url || !airbnb_url.value.trim()) errors.push('Airbnb/VRBO URL');
                    
                    // Check dropdowns (value="" means "Select..." not chosen)
                    if (!listing_type || listing_type.value === '') errors.push('Property Type');
                    if (!bedrooms || bedrooms.value === '') errors.push('Bedrooms');
                    if (!bathrooms || bathrooms.value === '') errors.push('Bathrooms');
                    if (!guest_capacity || guest_capacity.value === '') errors.push('Guest Capacity');
                    if (!total_photos || total_photos.value === '') errors.push('Total Photos');
                    
                    if (errors.length > 0) {
                        showMessage('❌ Please fill in: ' + errors.join(', '), 'error');
                        return;
                    }
                    
                    // Validate URL format
                    const url_lower = airbnb_url.value.toLowerCase();
                    if (!url_lower.includes('airbnb') && !url_lower.includes('vrbo')) {
                        showMessage('❌ Please enter a valid Airbnb or VRBO listing URL', 'error');
                        return;
                    }
                } else if (currentStep === 2) {
                    // Validate Step 2 - at least one comfort item checked
                    const checked = document.querySelectorAll('input[name="comfort"]:checked').length;
                    if (checked === 0) {
                        showMessage('❌ Please select at least one comfort item on Step 2', 'error');
                        return;
                    }
                }
            }
            
            currentStep += direction;
            if (currentStep < 1) currentStep = 1;
            if (currentStep > totalSteps) currentStep = totalSteps;
            showStep(currentStep);
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
        }
        
        async function handleSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            
            try {
                // Collect form data
                const property_name = document.querySelector('input[name="property_name"]').value;
                const email = document.querySelector('input[name="email"]').value;
                const report_type = document.querySelector('input[name="report_type"]:checked').value;
                
                const formData = {
                    email: email,
                    property_name: property_name,
                    airbnb_url: document.querySelector('input[name="airbnb_url"]').value || null,
                    listing_type: document.querySelector('select[name="listing_type"]').value,
                    bedrooms: parseInt(document.querySelector('select[name="bedrooms"]').value),
                    bathrooms: parseInt(document.querySelector('select[name="bathrooms"]').value),
                    guest_capacity: parseInt(document.querySelector('select[name="guest_capacity"]').value),
                    total_photos: document.querySelector('select[name="total_photos"]').value,
                    guest_comfort_checklist: Array.from(document.querySelectorAll('input[name="comfort"]:checked')).map(cb => cb.value),
                    report_type: report_type
                };
                
                // Different flows for Free vs Premium
                if (report_type === 'free') {
                    // FREE: Submit form → get verification email
                    showMessage('📧 Submitting your form...', 'loading');
                    
                    const response = await fetch('/api/submit-form', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        showMessage(
                            `✅ ${result.message}\n\nSubmission ID: ${result.submission_id}\n\n📧 Check your email (including spam/promotions folders) for your verification link.`,
                            'success'
                        );
                        document.getElementById('designForm').reset();
                        currentStep = 1;
                        showStep(1);
                    } else {
                        showMessage(`❌ Error: ${result.message}`, 'error');
                    }
                } else {
                    // PREMIUM: Submit form → create checkout session → redirect to Stripe
                    showMessage('💳 Processing payment...', 'loading');
                    
                    // First submit the form
                    const submitResponse = await fetch('/api/submit-form', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    
                    const submitResult = await submitResponse.json();
                    
                    if (!submitResult.success) {
                        showMessage(`❌ Form submission error: ${submitResult.message}`, 'error');
                        submitBtn.disabled = false;
                        return;
                    }
                    
                    // Then create checkout session
                    const checkoutResponse = await fetch('/api/create-checkout-session', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            submission_id: submitResult.submission_id,
                            property_name: property_name,
                            return_url: window.location.href
                        })
                    });
                    
                    const checkoutResult = await checkoutResponse.json();
                    
                    if (checkoutResult.success) {
                        // Redirect to Stripe Checkout
                        showMessage('🔄 Redirecting to secure payment...', 'loading');
                        window.location.href = checkoutResult.client_secret;
                    } else {
                        showMessage(`❌ Payment error: ${checkoutResult.message}`, 'error');
                    }
                }
            } catch (error) {
                showMessage(`❌ Error: ${error.message}`, 'error');
                submitBtn.disabled = false;
            }
        }
        
        // Initialize
        showStep(1);
    </script>
</body>
</html>
